##
## Local dev overrides — use local builds instead of ECR images.
##
## Usage:
##   docker compose -f docker-compose.host.yml -f docker-compose.dev.yml --env-file .env.host up -d
##

services:
  daemon:
    image: harbor-daemon:local
    build:
      context: ./daemon

  gateway:
    image: harbor-gateway:local
    build:
      context: ./gateway

  cli:
    image: harbor-gateway:local
    build:
      context: ./gateway

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    restart: unless-stopped
