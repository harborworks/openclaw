##
## Local dev overrides — daemon runs in Docker for convenience.
## Gateway (openclaw) runs directly on the host.
##
## Usage:
##   docker compose -f docker-compose.host.yml -f docker-compose.dev.yml --env-file .env.host up -d
##

services:
  daemon:
    image: harbor-daemon:local
    build:
      context: ./daemon

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    restart: unless-stopped
