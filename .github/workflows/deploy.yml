name: Deploy frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install root deps
        run: npm ci

      - name: Deploy Convex
        run: npx convex deploy --cmd 'echo ok'
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Seed admin user
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: |
          COGNITO_SUB=$(aws cognito-idp admin-get-user \
            --user-pool-id us-east-1_FbcunnevD \
            --username ben@sparrow.dev \
            --region us-east-1 \
            --query "UserAttributes[?Name=='sub'].Value" \
            --output text)
          npx convex run seed:createUser \
            "{\"email\":\"ben@sparrow.dev\",\"cognitoSub\":\"${COGNITO_SUB}\",\"isSuperAdmin\":true}"

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Deploy to S3
        run: aws s3 sync frontend/dist/ s3://harbor-app-frontend/ --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
