name: Deploy to prod

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Resolve instance ID
        id: resolve
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=harbor-app" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "No running instance found with Name=harbor-app"
            exit 1
          fi
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "Found instance: $INSTANCE_ID"

      - name: Deploy via SSM
        env:
          INSTANCE_ID: ${{ steps.resolve.outputs.instance_id }}
          DEPLOY_DIR: /opt/harbor-app
        run: |
          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 300 \
            --parameters commands='[
              "set -e",
              "cd '"$DEPLOY_DIR"'",
              "git fetch origin main",
              "git reset --hard origin/main",
              "cat > .env.prod << EOF\nDATABASE_NAME=postgres\nDATABASE_USER=postgres\nDATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}\nAPI_KEY=${{ secrets.API_KEY }}\nENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}\nPORT=3001\nCOGNITO_USER_POOL_ID=${{ secrets.COGNITO_USER_POOL_ID }}\nCOGNITO_CLIENT_ID=${{ secrets.COGNITO_CLIENT_ID }}\nCOGNITO_REGION=us-east-1\nSUPERADMIN_EMAILS=${{ secrets.SUPERADMIN_EMAILS }}\nEOF",
              "docker compose -f docker-compose.prod.yml build",
              "docker compose -f docker-compose.prod.yml up -d",
              "sleep 10",
              "curl -sf http://localhost:8000/health || exit 1",
              "echo Deploy successful"
            ]' \
            --output text \
            --query "Command.CommandId"

      - name: Wait for deploy
        env:
          INSTANCE_ID: ${{ steps.resolve.outputs.instance_id }}
        run: |
          COMMAND_ID=$(aws ssm list-commands \
            --instance-id "$INSTANCE_ID" \
            --max-results 1 \
            --query "Commands[0].CommandId" \
            --output text)
          
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "InProgress")
            
            if [ "$STATUS" = "Success" ]; then
              echo "Deploy successful"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Deploy failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi
            
            echo "Status: $STATUS, waiting..."
            sleep 10
          done
          echo "Deploy timed out"
          exit 1
