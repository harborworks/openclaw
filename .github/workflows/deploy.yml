name: Deploy to prod

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Resolve instance ID
        id: resolve
        run: |
          # Find the instance that SSM can actually reach
          CANDIDATES=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=harbor-app" "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" \
            --output text)
          INSTANCE_ID=""
          for id in $CANDIDATES; do
            PING=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$id" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null || echo "None")
            if [ "$PING" = "Online" ]; then
              INSTANCE_ID="$id"
              break
            fi
          done
          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "No running instance found with Name=harbor-app"
            exit 1
          fi
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "Found instance: $INSTANCE_ID"

      - name: Deploy via SSM
        id: ssm
        env:
          INSTANCE_ID: ${{ steps.resolve.outputs.instance_id }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 600 \
            --parameters '{"commands":["set -e && export HOME=/root && export GIT_SSH_COMMAND=\"ssh -i /home/ubuntu/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new\" && git config --global --add safe.directory /opt/harbor-app && cd /opt/harbor-app && git fetch origin main && git reset --hard origin/main && cat > .env.prod << '"'"'ENVEOF'"'"'\nDATABASE_NAME=postgres\nDATABASE_USER=postgres\nDATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}\nAPI_KEY=${{ secrets.API_KEY }}\nENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}\nPORT=3001\nCOGNITO_USER_POOL_ID=${{ secrets.COGNITO_USER_POOL_ID }}\nCOGNITO_CLIENT_ID=${{ secrets.COGNITO_CLIENT_ID }}\nCOGNITO_REGION=us-east-1\nSUPERADMIN_EMAILS=${{ secrets.SUPERADMIN_EMAILS }}\nENVEOF\n && docker compose -f docker-compose.prod.yml build && docker compose -f docker-compose.prod.yml up -d && sleep 10 && curl -sf http://localhost:8000/health && echo DEPLOY_SUCCESS"]}' \
            --output text \
            --query "Command.CommandId")
          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
          echo "SSM Command: $COMMAND_ID"

      - name: Wait for deploy
        env:
          INSTANCE_ID: ${{ steps.resolve.outputs.instance_id }}
          COMMAND_ID: ${{ steps.ssm.outputs.command_id }}
        run: |
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "InProgress")
            
            if [ "$STATUS" = "Success" ]; then
              echo "Deploy successful"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Deploy failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "{stdout:StandardOutputContent,stderr:StandardErrorContent}" \
                --output json
              exit 1
            fi
            
            echo "Status: $STATUS, waiting... ($i/60)"
            sleep 10
          done
          echo "Deploy timed out"
          exit 1
