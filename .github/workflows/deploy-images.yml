name: Build and publish harbor artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag override (defaults to git tag)"
        required: false

env:
  AWS_REGION: us-east-1
  S3_BUCKET: harbor-artifacts

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Determine version tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build openclaw tarball
        run: |
          cd openclaw
          npm ci
          npm pack
          mv openclaw-*.tgz ../openclaw.tgz

      - name: Build daemon tarball
        run: |
          cd daemon
          npm ci
          npm run build
          # Pack only what's needed for production
          npm pack
          mv harbor-daemon-*.tgz ../harbor-daemon.tgz

      - name: Upload artifacts to S3
        run: |
          VERSION="${{ steps.tag.outputs.tag }}"
          aws s3 cp openclaw.tgz "s3://${S3_BUCKET}/${VERSION}/openclaw.tgz"
          aws s3 cp harbor-daemon.tgz "s3://${S3_BUCKET}/${VERSION}/harbor-daemon.tgz"
          echo "Published artifacts to s3://${S3_BUCKET}/${VERSION}/"

      - name: Upload as latest
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          aws s3 cp openclaw.tgz "s3://${S3_BUCKET}/latest/openclaw.tgz"
          aws s3 cp harbor-daemon.tgz "s3://${S3_BUCKET}/latest/harbor-daemon.tgz"
          echo "Published artifacts to s3://${S3_BUCKET}/latest/"
