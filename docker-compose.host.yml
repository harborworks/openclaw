##
## Harbor Host stack — runs on each harbor host.
## Daemon polls the remote Harbor API; gateway runs local OpenClaw agents.
##
## Usage:
##   docker compose -f docker-compose.host.yml --env-file .env.host up -d
##

services:
  daemon:
    build:
      context: .
      dockerfile: Dockerfile.daemon
    environment:
      HARBOR_API_URL: ${HARBOR_API_URL:-http://host.docker.internal:3001/api}
      HARBOR_API_KEY: ${HARBOR_API_KEY:-dev-api-key}
      GATEWAY_URL: http://gateway:18789
      GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      DAEMON_PORT: "4747"
      TICK_INTERVAL_MS: "10000"
    ports:
      - "${DAEMON_PORT:-4747}:4747"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      gateway:
        condition: service_started
    restart: unless-stopped
    init: true

  gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-./.harbor-host/config}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-./.harbor-host/workspace}:/home/node/.openclaw/workspace
    ports:
      - "${GATEWAY_PORT:-18789}:18789"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--allow-unconfigured",
        "--bind",
        "lan",
        "--port",
        "18789",
      ]
