##
## Harbor Host stack — daemon only.
## Gateway (openclaw) runs directly on the host as a systemd service.
##
## Usage:
##   docker compose -f docker-compose.host.yml --env-file .env.host up -d
##
## NOTE: This file exists for backward compatibility with Docker-based daemon
## deployments. The recommended approach is to run the daemon directly on the
## host via systemd (see scripts/install-harbor.sh).
##

services:
  daemon:
    image: 429056709468.dkr.ecr.us-east-1.amazonaws.com/harbor-daemon:${DAEMON_VERSION:-latest}
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    network_mode: host
    environment:
      CONVEX_URL: ${CONVEX_URL:-}
      HARBOR_ID: ${HARBOR_ID:-}
      HARBOR_API_KEY: ${HARBOR_API_KEY:-}
      GATEWAY_URL: http://localhost:${GATEWAY_PORT:-18789}
      GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      DAEMON_PORT: "${DAEMON_PORT:-4747}"
      TICK_INTERVAL_MS: "5000"
      OPENCLAW_CONFIG_DIR: ${OPENCLAW_CONFIG_DIR:-/home/ubuntu/.openclaw}
      WORKSPACES_DIR: ${OPENCLAW_WORKSPACE_DIR:-/home/ubuntu/harbor/workspaces}
      HOME: /home/node
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-/home/ubuntu/.openclaw}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-/home/ubuntu/harbor/workspaces}:/home/node/workspaces
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped
    init: true
