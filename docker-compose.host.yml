##
## Harbor Host stack — runs on each harbor host.
## Daemon polls Convex; gateway runs local OpenClaw agents.
##
## Usage:
##   docker compose -f docker-compose.host.yml --env-file .env.host up -d
##

services:
  daemon:
    image: 429056709468.dkr.ecr.us-east-1.amazonaws.com/harbor-daemon:${DAEMON_VERSION:-latest}
    environment:
      CONVEX_URL: ${CONVEX_URL:-}
      HARBOR_ID: ${HARBOR_ID:-}
      HARBOR_API_KEY: ${HARBOR_API_KEY:-}
      GATEWAY_URL: http://gateway:18789
      GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      DAEMON_PORT: "4747"
      TICK_INTERVAL_MS: "5000"
      ENV_FILE_PATH: /home/node/.openclaw/.env
      WORKSPACES_DIR: /home/node/workspaces
      HOME: /home/node
    ports:
      - "${DAEMON_PORT:-4747}:4747"
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-./.harbor-host/config}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-./.harbor-host/workspace}:/home/node/workspaces
    depends_on:
      gateway:
        condition: service_started
    restart: unless-stopped
    init: true

  cli:
    image: 429056709468.dkr.ecr.us-east-1.amazonaws.com/harbor-gateway:${GATEWAY_VERSION:-latest}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      BROWSER: echo
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-./.harbor-host/config}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-./.harbor-host/workspace}:/home/node/workspaces
    network_mode: "service:gateway"
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["openclaw"]
    profiles:
      - cli

  gateway:
    image: 429056709468.dkr.ecr.us-east-1.amazonaws.com/harbor-gateway:${GATEWAY_VERSION:-latest}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-./.harbor-host/config}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-./.harbor-host/workspace}:/home/node/workspaces
    ports:
      - "${GATEWAY_PORT:-18789}:18789"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    init: true
    restart: unless-stopped
