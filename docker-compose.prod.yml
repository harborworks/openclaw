services:
  database:
    image: "postgres:17.2-alpine"
    env_file: .env.prod
    volumes:
      - harbor-db:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:3001"
    depends_on:
      database:
        condition: service_healthy
    env_file: .env.prod
    environment:
      DATABASE_HOST: database
      DATABASE_PORT: 5432

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: "https://api.harborworks.ai"
    ports:
      - "3000:80"

volumes:
  harbor-db:
